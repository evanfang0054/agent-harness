<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鲜果集 - 新鲜水果产地直发</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style type="text/tailwindcss">
    @theme {
      --color-brand-bg: #FFF8F0;
      --color-brand-primary: #FF6B35;
      --color-brand-secondary: #F7C948;
      --color-brand-accent: #E84393;
      --color-brand-green: #00B894;
      --color-brand-dark: #2D3436;
      --color-brand-muted: #636E72;
      --color-brand-card: #FFFFFF;
      --color-brand-peach: #FFEAA7;
      --color-brand-coral: #FF7675;
      --color-brand-border: #f0ece6;
      --color-brand-btn-bg: #f5f1eb;
      --font-display: 'Fredoka', 'Noto Sans SC', sans-serif;
    }
  </style>

  <style>
    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.08); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(255, 107, 53, 0); }
    }
    .pulse-glow { animation: pulseGlow 2s infinite; }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin-slow { animation: spin-slow 20s linear infinite; }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .slide-up { animation: slideUp 0.4s ease-out; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }

    .qty-btn { transition: transform 0.15s, background 0.15s; }
    .qty-btn:active { transform: scale(0.9); }

    /* 首页滚动容器 */
    .scroll-x::-webkit-scrollbar { display: none; }
    .scroll-x { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full w-full m-0 p-0 bg-brand-bg">
  <div id="root" class="min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==================== 水果数据 ====================
    const fruits = [
      {
        id: 1, name: '阳光芒果', origin: '海南三亚',
        price: 29.9, originalPrice: 49.9, unit: '斤',
        sweetness: '★★★★★', weight: '350-450g/个',
        desc: '树上自然熟，金灿灿的果肉入口即化，甜度高达22°Brix。每一口都是热带阳光的味道。',
        tags: ['当季爆款', '树上熟', '包邮'],
        image: 'https://images.unsplash.com/photo-1757281096599-b9165ba74008?fm=jpg&q=80&w=800&auto=format&fit=crop',
        color: '#FFD32A',
        category: 'tropical',
      },
      {
        id: 2, name: '丹东草莓', origin: '辽宁丹东',
        price: 39.9, originalPrice: 59.9, unit: '盒/300g',
        sweetness: '★★★★☆', weight: '15-25g/颗',
        desc: '红颜品种，颗颗饱满多汁，草莓味浓郁。',
        tags: ['新品', '产地直发'],
        image: 'https://images.unsplash.com/photo-1708100769120-015acf75bcc1?fm=jpg&q=80&w=800&auto=format&fit=crop',
        color: '#FF6B6B',
        category: 'berry',
      },
      {
        id: 3, name: '智利车厘子', origin: '智利',
        price: 79.9, originalPrice: 119.9, unit: '斤',
        sweetness: '★★★★★', weight: '10-12g/颗',
        desc: 'JJ级大果，深红如宝石，脆甜多汁。',
        tags: ['进口', 'JJ级'],
        image: 'https://images.unsplash.com/photo-1559619479-25dfed32ee96?fm=jpg&q=80&w=800&auto=format&fit=crop',
        color: '#A3183B',
        category: 'imported',
      },
      {
        id: 4, name: '云南蓝莓', origin: '云南红河',
        price: 24.9, originalPrice: 39.9, unit: '盒/125g',
        sweetness: '★★★★☆', weight: '12-18mm',
        desc: '高原阳光种植，花青素含量高，酸甜可口。',
        tags: ['高原种植', '花青素'],
        image: 'https://images.unsplash.com/photo-1510154011132-f48b8eabd172?fm=jpg&q=80&w=800&auto=format&fit=crop',
        color: '#5F27CD',
        category: 'berry',
      },
      {
        id: 5, name: '赣南脐橙', origin: '江西赣州',
        price: 19.9, originalPrice: 34.9, unit: '斤',
        sweetness: '★★★★☆', weight: '250-350g/个',
        desc: '国家地理标志产品，皮薄多汁，橙香浓郁。',
        tags: ['地标产品', '薄皮'],
        image: 'https://images.unsplash.com/photo-1547514701-42782101795e?fm=jpg&q=80&w=800&auto=format&fit=crop',
        color: '#F39C12',
        category: 'citrus',
      },
      {
        id: 6, name: '山竹', origin: '泰国',
        price: 45.9, originalPrice: 68.0, unit: '斤',
        sweetness: '★★★★★', weight: '30-50g/个',
        desc: '泰国直采，果壳薄嫩，果肉白如凝脂。',
        tags: ['进口', '泰国直采'],
        image: 'https://images.unsplash.com/photo-1615484477778-ca3b77940c25?fm=jpg&q=80&w=800&auto=format&fit=crop',
        color: '#6C3483',
        category: 'tropical',
      },
    ];

    const categories = [
      { key: 'all', label: '全部', icon: '🍽️' },
      { key: 'tropical', label: '热带水果', icon: '🥭' },
      { key: 'berry', label: '浆果', icon: '🫐' },
      { key: 'citrus', label: '柑橘', icon: '🍊' },
      { key: 'imported', label: '进口', icon: '✈️' },
    ];

    const specs = [
      { label: '1斤尝鲜装', price: '29.9' },
      { label: '3斤家庭装', price: '79.9' },
      { label: '5斤分享装', price: '119.9' },
    ];

    // ==================== 共享组件 ====================

    function DecorDots() {
      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          <div className="absolute -top-[60px] -right-[40px] w-40 h-40 rounded-full bg-brand-peach/30" />
          <div className="absolute top-[200px] -left-5 w-20 h-20 rounded-full bg-brand-secondary/25" />
          <div className="spin-slow absolute bottom-[300px] -right-[15px] w-[60px] h-[60px]">
            <div className="absolute top-0 left-[25px] w-2.5 h-2.5 rounded-full bg-brand-coral/40" />
            <div className="absolute bottom-0 left-2.5 w-2 h-2 rounded-full bg-brand-green/40" />
            <div className="absolute bottom-[5px] right-[5px] w-1.5 h-1.5 rounded-full bg-brand-accent/40" />
          </div>
        </div>
      );
    }

    function Toast({ message, visible }) {
      if (!visible) return null;
      return (
        <div className="absolute top-[70px] left-1/2 -translate-x-1/2 py-2.5 px-6 rounded-3xl bg-black/75 text-white text-sm font-semibold z-[100] animate-[bounceIn_0.3s_ease]">
          {message}
        </div>
      );
    }

    // ==================== 首页组件 ====================

    function HomeHeader({ cartCount }) {
      return (
        <div className="flex items-center justify-between px-4 py-3 bg-brand-bg/90 backdrop-blur-[10px] sticky top-0 z-50">
          <div className="flex items-center gap-2">
            <span className="text-2xl">🍊</span>
            <span className="font-black text-xl text-brand-dark font-display">鲜果集</span>
          </div>
          <div className="flex items-center gap-3">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2D3436" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <div className="relative">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2D3436" strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
              {cartCount > 0 && (
                <div className="absolute -top-1 -right-1.5 w-4 h-4 rounded-full bg-brand-accent text-white text-[10px] font-bold flex items-center justify-center">{cartCount}</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function SearchBar() {
      return (
        <div className="px-4 py-2">
          <div className="flex items-center gap-2 bg-white rounded-2xl px-4 py-2.5 border border-brand-border">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#636E72" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span className="text-sm text-brand-muted">搜索水果、产地...</span>
          </div>
        </div>
      );
    }

    function CategoryTabs({ active, onChange }) {
      return (
        <div className="px-4 py-2">
          <div className="flex gap-2 scroll-x overflow-x-auto">
            {categories.map(c => (
              <div key={c.key}
                onClick={() => onChange(c.key)}
                className={`shrink-0 px-4 py-2 rounded-2xl text-sm font-semibold cursor-pointer transition-all duration-200 ${
                  active === c.key
                    ? 'bg-brand-primary text-white shadow-md'
                    : 'bg-white text-brand-dark border border-brand-border'
                }`}
              >
                <span className="mr-1">{c.icon}</span>{c.label}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PromoBanner() {
      return (
        <div className="px-4 py-3">
          <div className="relative rounded-3xl overflow-hidden"
            style={{ background: 'linear-gradient(135deg, #FF6B35 0%, #FF7675 50%, #F7C948 100%)' }}
          >
            <div className="px-6 py-5 relative z-10">
              <div className="text-white/80 text-xs font-semibold tracking-wider mb-1">限时特惠</div>
              <div className="text-white text-xl font-black leading-tight">新人首单立减 ¥10</div>
              <div className="text-white/70 text-xs mt-1">满 49 元可用 · 今日有效</div>
              <div className="mt-3 inline-block px-4 py-1.5 bg-white rounded-full text-brand-primary text-xs font-bold cursor-pointer">
                立即领取 →
              </div>
            </div>
            {/* 装饰圆 */}
            <div className="absolute -right-4 -top-4 w-24 h-24 rounded-full bg-white/10" />
            <div className="absolute right-8 -bottom-6 w-20 h-20 rounded-full bg-white/10" />
          </div>
        </div>
      );
    }

    function FruitCard({ fruit, onClick }) {
      return (
        <div onClick={() => onClick(fruit.id)}
          className="bg-brand-card rounded-3xl border border-brand-border overflow-hidden cursor-pointer transition-transform duration-200 hover:scale-[1.02] active:scale-[0.98]"
        >
          <div className="relative">
            <img src={fruit.image} alt={fruit.name}
              className="w-full h-[160px] object-cover" />
            {fruit.tags[0] && (
              <div className="absolute top-2.5 left-2.5 px-2.5 py-1 rounded-full text-[10px] font-bold text-white"
                style={{ background: fruit.color + 'CC' }}
              >{fruit.tags[0]}</div>
            )}
          </div>
          <div className="p-3">
            <div className="flex items-center justify-between">
              <h3 className="text-[15px] font-bold text-brand-dark">{fruit.name}</h3>
              <span className="text-[11px] text-brand-muted">{fruit.origin}</span>
            </div>
            <div className="flex items-baseline justify-between mt-2">
              <div className="flex items-baseline gap-1">
                <span className="text-xs text-brand-primary font-bold">¥</span>
                <span className="text-xl font-extrabold text-brand-primary font-display leading-none">{fruit.price}</span>
                <span className="text-[11px] text-brand-muted ml-0.5">/{fruit.unit}</span>
              </div>
              {fruit.originalPrice && (
                <span className="text-[11px] text-gray-300 line-through">¥{fruit.originalPrice}</span>
              )}
            </div>
          </div>
        </div>
      );
    }

    function FruitGrid({ items, onItemClick }) {
      return (
        <div className="px-4 pb-6">
          <div className="grid grid-cols-2 gap-3">
            {items.map((fruit, i) => (
              <div key={fruit.id} className="slide-up" style={{ animationDelay: `${i * 60}ms`, animationFillMode: 'both' }}>
                <FruitCard fruit={fruit} onClick={onItemClick} />
              </div>
            ))}
          </div>
        </div>
      );
    }

    function HomeTabBar({ active, onChange }) {
      const tabs = [
        { key: 'home', label: '首页', icon: (a) => <svg width="22" height="22" viewBox="0 0 24 24" fill={a ? '#FF6B35' : 'none'} stroke={a ? '#FF6B35' : '#636E72'} strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg> },
        { key: 'category', label: '分类', icon: (a) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a ? '#FF6B35' : '#636E72'} strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> },
        { key: 'cart', label: '购物车', icon: (a) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a ? '#FF6B35' : '#636E72'} strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg> },
        { key: 'profile', label: '我的', icon: (a) => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={a ? '#FF6B35' : '#636E72'} strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
      ];
      return (
        <div className="fixed bottom-0 inset-x-0 flex items-center justify-around py-2 pb-[max(8px,env(safe-area-inset-bottom))] bg-white/95 backdrop-blur-[12px] border-t border-brand-border z-40">
          {tabs.map(t => (
            <div key={t.key} onClick={() => onChange(t.key)}
              className={`flex flex-col items-center gap-0.5 cursor-pointer px-3 py-1 ${active === t.key ? 'text-brand-primary' : 'text-brand-muted'}`}
            >
              {t.icon(active === t.key)}
              <span className={`text-[10px] font-semibold ${active === t.key ? 'text-brand-primary' : 'text-brand-muted'}`}>{t.label}</span>
            </div>
          ))}
        </div>
      );
    }

    // ==================== 首页 ====================

    function HomePage({ onNavigate, cartCount }) {
      const [category, setCategory] = useState('all');
      const filtered = category === 'all' ? fruits : fruits.filter(f => f.category === category);

      return (
        <div className="relative bg-brand-bg min-h-screen pb-20">
          <HomeHeader cartCount={cartCount} />
          <SearchBar />
          <CategoryTabs active={category} onChange={setCategory} />
          <PromoBanner />
          <FruitGrid items={filtered} onItemClick={(id) => onNavigate('detail', id)} />
          <HomeTabBar active="home" onChange={(key) => {
            if (key === 'cart') onNavigate('cart');
          }} />
        </div>
      );
    }

    // ==================== 详情页组件 ====================

    function DetailNavBar({ onBack, title }) {
      return (
        <div className="flex items-center justify-between px-4 py-3 bg-brand-bg/90 backdrop-blur-[10px] sticky top-0 z-50">
          <div onClick={onBack} className="cursor-pointer flex items-center gap-1">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2D3436" strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          </div>
          <span className="font-bold text-[17px] text-brand-dark">{title}</span>
          <div className="flex gap-3">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2D3436" strokeWidth="2" strokeLinecap="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16,6 12,2 8,6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            <div className="relative">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2D3436" strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
              <div className="absolute -top-1 -right-1.5 w-4 h-4 rounded-full bg-brand-accent text-white text-[10px] font-bold flex items-center justify-center">3</div>
            </div>
          </div>
        </div>
      );
    }

    function ProductHero({ image, name, color }) {
      const [loaded, setLoaded] = useState(false);
      return (
        <div className="relative overflow-hidden rounded-b-[32px]">
          <div className="absolute inset-0" style={{ background: `linear-gradient(135deg, ${color}22 0%, #FFF8F0 100%)` }} />
          <div className={`flex justify-center px-6 pt-5 pb-4 ${loaded ? 'bounce-in' : ''}`}>
            <img src={image} alt={name} onLoad={() => setLoaded(true)}
              className="w-full h-[280px] object-cover rounded-3xl"
              style={{ boxShadow: `0 8px 32px ${color}33` }}
            />
          </div>
          <div className="flex justify-center gap-1.5 pb-3">
            <div className="w-5 h-1 rounded-sm bg-brand-primary" />
            <div className="w-2 h-1 rounded-sm bg-gray-300" />
            <div className="w-2 h-1 rounded-sm bg-gray-300" />
          </div>
        </div>
      );
    }

    function PriceSection({ price, originalPrice, unit, tags }) {
      return (
        <div className="px-5 pb-4">
          <div className="flex items-baseline gap-2">
            <span className="text-sm font-bold text-brand-primary">¥</span>
            <span className="text-[36px] font-black text-brand-primary font-display leading-none">{price}</span>
            <span className="text-[13px] text-brand-muted">/ {unit}</span>
            {originalPrice && (
              <span className="text-[13px] text-gray-300 line-through ml-1">¥{originalPrice}</span>
            )}
          </div>
          <div className="flex gap-2 mt-2.5 flex-wrap">
            {tags.map((tag, i) => (
              <span key={i} className="py-1 px-3 rounded-[20px] text-[11px] font-semibold"
                style={{
                  background: i === 0 ? '#FF6B3518' : '#F7C94830',
                  color: i === 0 ? '#FF6B35' : '#2D3436',
                  border: i === 0 ? '1.5px solid #FF6B3544' : '1.5px solid #F7C94855',
                }}
              >{tag}</span>
            ))}
          </div>
        </div>
      );
    }

    function ProductName({ name, origin }) {
      return (
        <div className="px-5 pt-2 pb-1">
          <h1 className="text-[22px] font-black text-brand-dark leading-tight m-0">{name}</h1>
          <div className="flex items-center gap-1 mt-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00B894" strokeWidth="2.5" strokeLinecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span className="text-[13px] text-brand-muted font-medium">产地直发 · {origin}</span>
          </div>
        </div>
      );
    }

    function SpecSelector({ specs, selected, onSelect }) {
      return (
        <div className="px-5 pb-4">
          <div className="text-sm font-bold text-brand-dark mb-2.5">选择规格</div>
          <div className="flex gap-2.5 flex-wrap">
            {specs.map((spec, i) => (
              <div key={i} onClick={() => onSelect(i)}
                className="qty-btn py-2.5 px-[18px] rounded-2xl cursor-pointer"
                style={{
                  border: selected === i ? '2.5px solid #FF6B35' : '2px solid #eee',
                  background: selected === i ? '#FF6B3510' : '#FFFFFF',
                  transition: 'all 0.2s',
                }}
              >
                <div className={`text-sm font-semibold ${selected === i ? 'text-brand-primary' : 'text-brand-dark'}`}>{spec.label}</div>
                <div className="text-xs text-brand-muted mt-0.5">¥{spec.price}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function QualityInfo({ sweetness, weight }) {
      const items = [
        { icon: '🍬', label: '甜度', value: sweetness },
        { icon: '⚖️', label: '规格', value: weight },
        { icon: '🚚', label: '配送', value: '顺丰冷链' },
        { icon: '🛡️', label: '保障', value: '坏果包赔' },
      ];
      return (
        <div className="px-5 pb-4">
          <div className="grid grid-cols-2 gap-2.5">
            {items.map((item, i) => (
              <div key={i} className="py-3 px-3.5 rounded-2xl bg-brand-card border-[1.5px] border-brand-border flex items-center gap-2.5">
                <span className="text-xl">{item.icon}</span>
                <div>
                  <div className="text-[11px] text-brand-muted font-medium">{item.label}</div>
                  <div className="text-[13px] font-bold text-brand-dark mt-px">{item.value}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Description({ text }) {
      return (
        <div className="px-5 pb-4">
          <div className="py-4 px-[18px] rounded-[20px] border-[1.5px]"
            style={{ background: 'linear-gradient(135deg, #FFEAA744 0%, #F7C94822 100%)', borderColor: '#FFEAA766' }}
          >
            <div className="text-sm font-bold text-brand-dark mb-1.5">「水果故事」</div>
            <p className="text-[13.5px] text-brand-muted leading-relaxed m-0">{text}</p>
          </div>
        </div>
      );
    }

    function RecommendFruits({ items, onClick }) {
      return (
        <div className="px-5 pb-6">
          <div className="text-[15px] font-bold text-brand-dark mb-3">你可能还喜欢</div>
          <div className="flex gap-3 overflow-x-auto scroll-x pb-1">
            {items.map((fruit) => (
              <div key={fruit.id} onClick={() => onClick(fruit.id)}
                className="min-w-[140px] rounded-[20px] bg-brand-card border-[1.5px] border-brand-border overflow-hidden cursor-pointer shrink-0 hover:scale-[1.02] transition-transform"
              >
                <img src={fruit.image} alt={fruit.name} className="w-full h-[100px] object-cover" />
                <div className="py-2.5 px-3">
                  <div className="text-[13px] font-bold text-brand-dark">{fruit.name}</div>
                  <div className="flex items-baseline gap-1 mt-1">
                    <span className="text-[11px] text-brand-primary font-bold">¥</span>
                    <span className="text-lg font-extrabold text-brand-primary font-display">{fruit.price}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function BuyBar({ price, qty, onQtyChange, onAddCart, onBuyNow }) {
      return (
        <div className="fixed bottom-0 inset-x-0 flex items-center gap-3 px-4 py-3 bg-white/95 backdrop-blur-[12px] border-t-[1.5px] border-brand-border z-40">
          <div className="flex items-center gap-2">
            <div className="qty-btn w-[30px] h-[30px] rounded-[10px] flex items-center justify-center bg-brand-btn-bg cursor-pointer text-base font-bold text-brand-dark"
              onClick={() => onQtyChange(Math.max(1, qty - 1))}>−</div>
            <span className="text-base font-extrabold min-w-6 text-center font-display">{qty}</span>
            <div className="qty-btn w-[30px] h-[30px] rounded-[10px] flex items-center justify-center bg-brand-btn-bg cursor-pointer text-base font-bold text-brand-dark"
              onClick={() => onQtyChange(qty + 1)}>+</div>
          </div>
          <div onClick={onAddCart}
            className="flex-1 py-3 rounded-2xl text-center bg-brand-secondary text-brand-dark font-bold text-[15px] cursor-pointer transition-transform duration-150"
          >加入购物车</div>
          <div onClick={onBuyNow}
            className="pulse-glow flex-1 py-3 rounded-2xl text-center text-white font-bold text-[15px] cursor-pointer transition-transform duration-150"
            style={{ background: 'linear-gradient(135deg, #FF6B35, #FF7675)' }}
          >立即购买</div>
        </div>
      );
    }

    // ==================== 详情页 ====================

    function DetailPage({ productId, onBack, onNavigate, cartCount, setCartCount }) {
      const product = fruits.find(f => f.id === productId) || fruits[0];
      const recommendItems = fruits.filter(f => f.id !== productId);
      const [selectedSpec, setSelectedSpec] = useState(0);
      const [qty, setQty] = useState(1);
      const [toast, setToast] = useState({ visible: false, message: '' });

      const showToast = (msg) => {
        setToast({ visible: true, message: msg });
        setTimeout(() => setToast({ visible: false, message: '' }), 1800);
      };

      return (
        <div className="relative bg-brand-bg min-h-screen fade-in">
          <DecorDots />
          <DetailNavBar onBack={onBack} title={product.name} />
          <ProductHero image={product.image} name={product.name} color={product.color} />
          <ProductName name={product.name} origin={product.origin} />
          <PriceSection price={product.price} originalPrice={product.originalPrice} unit={product.unit} tags={product.tags} />
          <SpecSelector specs={specs} selected={selectedSpec} onSelect={setSelectedSpec} />
          <QualityInfo sweetness={product.sweetness} weight={product.weight} />
          <Description text={product.desc} />
          <RecommendFruits items={recommendItems} onClick={(id) => onNavigate('detail', id)} />
          <div className="h-[70px]" />
          <BuyBar
            price={specs[selectedSpec].price}
            qty={qty} onQtyChange={setQty}
            onAddCart={() => { setCartCount(cartCount + qty); showToast(`已加入购物车 ×${qty}`); }}
            onBuyNow={() => showToast('正在跳转结算...')}
          />
          <Toast message={toast.message} visible={toast.visible} />
        </div>
      );
    }

    // ==================== 路由容器 ====================

    function App() {
      const [page, setPage] = useState('home');
      const [productId, setProductId] = useState(null);
      const [cartCount, setCartCount] = useState(3);

      const navigate = (target, id) => {
        setPage(target);
        setProductId(id);
        window.scrollTo(0, 0);
      };

      const goHome = () => navigate('home');

      if (page === 'detail' && productId) {
        return <DetailPage productId={productId} onBack={goHome} onNavigate={navigate} cartCount={cartCount} setCartCount={setCartCount} />;
      }

      return <HomePage onNavigate={navigate} cartCount={cartCount} />;
    }

    // ==================== 渲染 ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
